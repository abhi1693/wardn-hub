name: Security Checks

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  frontend-dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps (ignore scripts)
        run: npm ci --ignore-scripts

      - name: npm audit (high+; omit dev)
        run: npm audit --audit-level=high --omit=dev

  backend-dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: hub/backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Export dependencies
        run: uv export --extra dev --format requirements-txt --no-hashes --no-emit-project --output-file requirements-audit.txt

      - name: pip-audit (project dependencies)
        run: uvx pip-audit --progress-spinner off -r requirements-audit.txt
