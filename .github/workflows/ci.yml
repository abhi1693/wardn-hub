name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run web:lint

      - name: Build
        run: npm run web:build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: hub/backend
          file: hub/backend/Dockerfile
          push: false
          tags: wardn-hub-backend:ci
          cache-from: type=gha,scope=wardn-hub-backend-ci
          cache-to: type=gha,mode=max,scope=wardn-hub-backend-ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/frontend/Dockerfile
          push: false
          tags: wardn-hub-frontend:ci
          cache-from: type=gha,scope=wardn-hub-frontend-ci
          cache-to: type=gha,mode=max,scope=wardn-hub-frontend-ci
