name: Container images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver image version without a leading v
        required: true

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Build backend ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/abhi1693/wardn-hub/backend
          tags: |
            type=semver,pattern={{version}}-${{ matrix.suffix }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.version }}-${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - uses: docker/build-push-action@v7
        with:
          context: hub/backend
          file: hub/backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name || inputs.version }}
          cache-from: |
            type=registry,ref=ghcr.io/abhi1693/wardn-hub/backend:buildcache-${{ matrix.suffix }}
            type=gha,scope=wardn-hub-backend-${{ matrix.suffix }}
          cache-to: |
            type=registry,ref=ghcr.io/abhi1693/wardn-hub/backend:buildcache-${{ matrix.suffix }},mode=max
            type=gha,mode=max,scope=wardn-hub-backend-${{ matrix.suffix }}

  backend-manifest:
    name: Publish backend manifest
    needs: backend
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        env:
          IMAGE: ghcr.io/abhi1693/wardn-hub/backend
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          version="${RELEASE_TAG#v}"
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            "${IMAGE}:${version}-amd64" \
            "${IMAGE}:${version}-arm64"

  frontend:
    name: Build frontend ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/abhi1693/wardn-hub/frontend
          tags: |
            type=semver,pattern={{version}}-${{ matrix.suffix }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.version }}-${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name || inputs.version }}
          cache-from: |
            type=registry,ref=ghcr.io/abhi1693/wardn-hub/frontend:buildcache-${{ matrix.suffix }}
            type=gha,scope=wardn-hub-frontend-${{ matrix.suffix }}
          cache-to: |
            type=registry,ref=ghcr.io/abhi1693/wardn-hub/frontend:buildcache-${{ matrix.suffix }},mode=max
            type=gha,mode=max,scope=wardn-hub-frontend-${{ matrix.suffix }}

  frontend-manifest:
    name: Publish frontend manifest
    needs: frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        env:
          IMAGE: ghcr.io/abhi1693/wardn-hub/frontend
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          version="${RELEASE_TAG#v}"
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            "${IMAGE}:${version}-amd64" \
            "${IMAGE}:${version}-arm64"
