name: Container Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend linux/arm64
    uses: abhi1693/actions/.github/workflows/docker-build-push.yml@master
    with:
      runs-on: ubuntu-24.04-arm
      image: ghcr.io/${{ github.repository }}/backend
      context: hub/backend
      file: hub/backend/Dockerfile
      platforms: linux/arm64
      cache-scope: wardn-hub-backend-arm64
      build-args: |
        APP_VERSION=${{ github.event.release.tag_name }}
      tags: |
        type=semver,pattern={{version}}
        type=raw,value=latest
      labels: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.title=wardn-hub-backend
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Frontend linux/arm64
    uses: abhi1693/actions/.github/workflows/docker-build-push.yml@master
    with:
      runs-on: ubuntu-24.04-arm
      image: ghcr.io/${{ github.repository }}/frontend
      context: .
      file: hub/frontend/Dockerfile
      platforms: linux/arm64
      cache-scope: wardn-hub-frontend-arm64
      build-args: |
        APP_VERSION=${{ github.event.release.tag_name }}
      tags: |
        type=semver,pattern={{version}}
        type=raw,value=latest
      labels: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.title=wardn-hub-frontend
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
